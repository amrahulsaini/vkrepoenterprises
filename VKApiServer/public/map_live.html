<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
  html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; }
  body { background: #1a1a1a; font-family: 'Segoe UI', system-ui, sans-serif; }

  /* ── Popup card ─────────────────────────────────────────────── */
  .popup-card { min-width: 210px; }
  .popup-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .popup-avatar {
    width: 46px; height: 46px; border-radius: 50%;
    object-fit: cover; flex-shrink: 0;
    border: 2px solid #dc2626; background: #f1f5f9;
  }
  .popup-avatar-fallback {
    width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: #1565c0; color: #fff; font-weight: 700; font-size: 18px;
    border: 2px solid #dc2626;
  }
  .popup-name { font-size: 15px; font-weight: 700; color: #0f172a; line-height: 1.2; }
  .popup-sub  { font-size: 12px; color: #64748b; margin-top: 2px; }
  .popup-row  { display: flex; align-items: center; gap: 6px; margin: 4px 0; font-size: 12.5px; color: #334155; }
  .popup-place { font-size: 11.5px; color: #64748b; margin-top: 4px; font-style: italic; }
  .popup-time  { font-size: 11.5px; color: #dc2626; font-weight: 600; margin-top: 4px; }
  .popup-coords{ font-size: 10px; color: #94a3b8; margin-top: 3px; font-family: ui-monospace, Consolas, monospace; }

  /* Round, modern popup container */
  .leaflet-popup-content-wrapper { border-radius: 12px; box-shadow: 0 8px 28px rgba(0,0,0,.22); }
  .leaflet-popup-content { margin: 12px 14px; }

  /* Compact, never-clipped attribution */
  .leaflet-control-attribution {
    font-size: 9px !important; background: rgba(255,255,255,.78) !important;
    padding: 1px 6px !important; border-radius: 6px 0 0 0;
  }

  /* Custom control buttons (fullscreen) */
  .map-btn {
    width: 34px; height: 34px; background: #fff; border-radius: 8px;
    box-shadow: 0 1px 5px rgba(0,0,0,.3); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; color: #1565c0; user-select: none;
  }
  .map-btn:hover { background: #eff6ff; }

  /* Pulsing ring on markers */
  @keyframes pulse {
    0% { transform: scale(1); opacity: .6; }
    70%,100% { transform: scale(2.4); opacity: 0; }
  }
  .pulse-ring {
    width: 14px; height: 14px; border-radius: 50%;
    background: rgba(220,38,38,.45); position: absolute; top: 2px; left: 6px;
    animation: pulse 2s ease-out infinite; pointer-events: none;
  }
</style>
<link rel="stylesheet" href="leaflet/leaflet.css"/>
<script src="leaflet/leaflet.js"></script>
</head>
<body>
<div id="map"></div>
<script>
  // ── Base layers ───────────────────────────────────────────────
  // Street (OSM) + Satellite (Esri World Imagery). Attribution kept
  // (small, styled) so we honour both providers' terms without it
  // getting clipped at the viewport bottom.
  var street = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, attribution: '© OpenStreetMap'
  });
  var satellite = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { maxZoom: 19, attribution: 'Esri, Maxar' }
  );
  // Labels overlay to put place names on top of satellite imagery.
  var labels = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
    { maxZoom: 19 }
  );
  var satelliteGroup = L.layerGroup([satellite, labels]);

  var map = L.map('map', {
    zoomControl: true,
    attributionControl: true,
    layers: [street]
  }).setView([20.5937, 78.9629], 5);

  L.control.layers(
    { 'Street': street, 'Satellite': satelliteGroup },
    {}, { position: 'topright', collapsed: false }
  ).addTo(map);

  // ── Fullscreen control ────────────────────────────────────────
  var FullscreenCtl = L.Control.extend({
    options: { position: 'topleft' },
    onAdd: function () {
      var b = L.DomUtil.create('div', 'map-btn leaflet-bar');
      b.innerHTML = '⛶';
      b.title = 'Toggle full screen';
      L.DomEvent.disableClickPropagation(b);
      b.onclick = function () {
        var el = document.documentElement;
        if (!document.fullscreenElement) {
          (el.requestFullscreen || el.webkitRequestFullscreen || function(){}).call(el);
          b.innerHTML = '🗗';
        } else {
          (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document);
          b.innerHTML = '⛶';
        }
        setTimeout(function () { map.invalidateSize(); }, 250);
      };
      return b;
    }
  });
  map.addControl(new FullscreenCtl());
  document.addEventListener('fullscreenchange', function () {
    setTimeout(function () { map.invalidateSize(); }, 250);
  });

  // ── Marker icon ───────────────────────────────────────────────
  var redIcon = L.divIcon({
    className: '',
    iconSize:   [28, 40], iconAnchor: [14, 40], popupAnchor: [0, -42],
    html: '<div class="pulse-ring"></div>' +
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 40" width="28" height="40">' +
          '<path d="M14 0C6.268 0 0 6.268 0 14c0 9.333 14 26 14 26S28 23.333 28 14C28 6.268 21.732 0 14 0z" fill="#dc2626"/>' +
          '<circle cx="14" cy="14" r="6" fill="white"/></svg>'
  });

  var markers = [];
  var geocodeCache = {};

  function initials(name) {
    var p = (name || '').trim().split(/\s+/);
    return ((p[0]||'')[0]||'').toUpperCase() + ((p[1]||'')[0]||'').toUpperCase() || '?';
  }
  function formatCoords(lat, lng) { return lat.toFixed(5) + ', ' + lng.toFixed(5); }
  function esc(s) { return (s||'').replace(/[&<>"]/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

  function reverseGeocode(lat, lng, cb) {
    var key = lat.toFixed(4) + ',' + lng.toFixed(4);
    if (geocodeCache[key]) { cb(geocodeCache[key]); return; }
    fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lng+
          '&format=json&zoom=14&accept-language=en', { headers: { 'Accept':'application/json' } })
      .then(function(r){ return r.json(); })
      .then(function(d){
        var a = d.address || {}, parts = [];
        if (a.village||a.suburb||a.neighbourhood) parts.push(a.village||a.suburb||a.neighbourhood);
        if (a.city||a.town||a.county) parts.push(a.city||a.town||a.county);
        if (a.state) parts.push(a.state);
        var place = parts.length ? parts.join(', ') : (d.display_name||'');
        geocodeCache[key] = place; cb(place);
      }).catch(function(){ cb(''); });
  }

  function buildPopupHtml(u, place) {
    // Avatar: profile photo if present, otherwise initials circle.
    var avatar = u.pfp
      ? '<img class="popup-avatar" src="'+esc(u.pfp)+'" ' +
        'onerror="this.outerHTML=\'<div class=&quot;popup-avatar-fallback&quot;>'+esc(initials(u.name))+'</div>\'"/>'
      : '<div class="popup-avatar-fallback">'+esc(initials(u.name))+'</div>';
    var placeRow = place ? '<div class="popup-place">📍 '+esc(place)+'</div>' : '';
    return '<div class="popup-card">' +
        '<div class="popup-head">' + avatar +
          '<div><div class="popup-name">'+esc(u.name)+'</div>' +
          '<div class="popup-sub">📞 '+esc(u.mobile)+'</div></div>' +
        '</div>' +
        placeRow +
        '<div class="popup-time">🕒 '+esc(u.lastSeen)+'</div>' +
        '<div class="popup-coords">🌐 '+formatCoords(u.lat, u.lng)+'</div>' +
      '</div>';
  }

  function updateMarkers(j) {
    markers.forEach(function(m){ map.removeLayer(m); });
    markers = [];
    var users = Array.isArray(j) ? j : JSON.parse(j);

    // Spread overlapping pins in a small circle so each is clickable.
    var count = {}, idx = {};
    users.forEach(function(u){ if(!u.lat||!u.lng) return;
      var k=u.lat.toFixed(4)+','+u.lng.toFixed(4); count[k]=(count[k]||0)+1; });

    users.forEach(function(u){
      if (!u.lat || !u.lng) return;
      var k = u.lat.toFixed(4)+','+u.lng.toFixed(4);
      idx[k] = idx[k]||0; var i = idx[k], total = count[k]; idx[k]++;
      var lat = u.lat, lng = u.lng;
      if (total > 1) {
        var ang = (2*Math.PI/total)*i, off = 0.0015;
        lat += off*Math.cos(ang); lng += off*Math.sin(ang);
      }
      var m = L.marker([lat,lng], { icon: redIcon }).addTo(map);
      m.bindPopup(buildPopupHtml(u, ''), { maxWidth: 280 });
      m.on('popupopen', function(){
        reverseGeocode(u.lat, u.lng, function(place){
          m.getPopup().setContent(buildPopupHtml(u, place));
        });
      });
      markers.push(m);
    });
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>
  html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; }
  body { background: #1a1a1a; }
  .popup-card { font-family: 'Segoe UI', sans-serif; min-width: 210px; }
  .popup-vrn  { font-size: 15px; font-weight: 700; color: #111; margin-bottom: 4px; letter-spacing: 1px; font-family: monospace; }
  .popup-row  { display: flex; align-items: center; gap: 6px; margin: 3px 0; font-size: 12px; color: #444; }
  .popup-sub  { font-size: 11px; color: #666; margin-top: 4px; font-style: italic; }
  .popup-time { font-size: 11px; color: #1d4ed8; font-weight: 600; margin-top: 4px; }
  .popup-coords { font-size: 10px; color: #999; margin-top: 2px; font-family: monospace; }
</style>
<link rel="stylesheet" href="leaflet/leaflet.css"/>
<script src="leaflet/leaflet.js"></script>
</head>
<body>
<div id="map"></div>
<script>
  function getParam(name) {
    var url = new URLSearchParams(window.location.search);
    return url.get(name) || '';
  }

  var lat    = parseFloat(getParam('lat'))  || 20.5937;
  var lng    = parseFloat(getParam('lng'))  || 78.9629;
  var name   = getParam('name');
  var mobile = getParam('mobile');
  var vrn    = getParam('vrn');
  var chassis= getParam('chassis');
  var model  = getParam('model');
  var time   = getParam('time');
  var addr   = getParam('addr');

  var hasPin = getParam('lat') !== '' && getParam('lng') !== '';

  var map = L.map('map', { zoomControl: true }).setView([lat, lng], hasPin ? 15 : 5);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors', maxZoom: 19
  }).addTo(map);

  if (hasPin) {
    var redIcon = L.divIcon({
      className: '',
      iconSize:   [28, 40], iconAnchor: [14, 40], popupAnchor: [0, -42],
      html: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 40" width="28" height="40">' +
            '<path d="M14 0C6.268 0 0 6.268 0 14c0 9.333 14 26 14 26S28 23.333 28 14C28 6.268 21.732 0 14 0z" fill="#dc2626"/>' +
            '<circle cx="14" cy="14" r="6" fill="white"/>' +
            '</svg>'
    });

    function buildPopup(place) {
      var placeRow = place
        ? '<div class="popup-sub">&#128205; ' + place + '</div>' : '';
      var nameRow  = name   ? '<div class="popup-row">&#128100; ' + name   + (mobile ? ' &nbsp;&#128222; ' + mobile : '') + '</div>' : '';
      var modelRow = model  ? '<div class="popup-row">&#128664; ' + (vrn ? vrn + ' — ' : '') + model + (chassis ? ' &nbsp;| ' + chassis : '') + '</div>' : '';
      var timeRow  = time   ? '<div class="popup-time">&#128336; ' + time + '</div>' : '';
      return '<div class="popup-card">' +
        '<div class="popup-vrn">' + (vrn || 'Unknown VRN') + '</div>' +
        nameRow + modelRow + placeRow + timeRow +
        '<div class="popup-coords">&#127759; ' + lat.toFixed(5) + ', ' + lng.toFixed(5) + '</div>' +
        '</div>';
    }

    var marker = L.marker([lat, lng], { icon: redIcon }).addTo(map);

    if (addr) {
      marker.bindPopup(buildPopup(addr), { maxWidth: 280 }).openPopup();
    } else {
      marker.bindPopup(buildPopup(''), { maxWidth: 280 }).openPopup();
      fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lng +
            '&format=json&zoom=16&accept-language=en', { headers: { 'Accept': 'application/json' } })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var a = data.address || {};
          var parts = [];
          if (a.road) parts.push(a.road);
          if (a.village || a.suburb || a.neighbourhood)
            parts.push(a.village || a.suburb || a.neighbourhood);
          if (a.city || a.town || a.county)
            parts.push(a.city || a.town || a.county);
          if (a.state) parts.push(a.state);
          var place = parts.length ? parts.join(', ') : (data.display_name || '');
          marker.getPopup().setContent(buildPopup(place));
        })
        .catch(function() {});
    }
  }
</script>
</body>
</html>
